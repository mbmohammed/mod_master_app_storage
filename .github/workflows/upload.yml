name: Auto APK Uploader

on:
  push:
    paths:
      - 'latest_link.txt'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # መላው ሥራ ከ 3 ደቂቃ በላይ ከፈጀ በግድ እንዲቆም ያደርጋል
    timeout-minutes: 3

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Read and Clean Download Link
      run: |
        LINK=$(cat latest_link.txt | tr -d '\r' | tr -d '\n' | xargs)
        
        if [[ "$LINK" == *.apk* ]]; then
          FILENAME=$(basename "$LINK" | cut -d? -f1)
        else
          FILENAME=$(basename "$LINK").apk
        fi
        
        if [[ -z "$FILENAME" || "$FILENAME" == *.com* ]]; then
          FILENAME="app_$(date +%s).apk"
        fi
        
        echo "TG_LINK=$LINK" >> $GITHUB_ENV
        echo "APK_NAME=$FILENAME" >> $GITHUB_ENV

    - name: Download APK Directly
      run: |
        echo "📥 አፑን ማውረድ ተጀምሯል..."
        # --connect-timeout 10 (ካላገኘው በ10 ሰከንድ ይቁም) 
        # --max-time 40 (ማውረዱ ከ40 ሰከንድ በላይ ከፈጀ በግድ ይቋረጥ)
        curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
          --connect-timeout 10 \
          --max-time 40 \
          -o "${{ env.APK_NAME }}" "${{ env.TG_LINK }}"
        
        FILE_SIZE=$(stat -c%s "${{ env.APK_NAME }}" 2>/dev/null || echo 0)
        echo "💡 የወረደው ፋይል መጠን: $FILE_SIZE Bytes"
        
        if [ "$FILE_SIZE" -lt 1000 ]; then
          echo "❌ ስህተት: ፋይሉ አልወረደም ወይም ሊንኩ ተዘግቷል!"
          exit 1
        fi

    - name: Upload to GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release view v1.0 || gh release create v1.0 --title "Mod Master Store" --notes "Uploaded via Admin UI"
        gh release upload v1.0 "${{ env.APK_NAME }}" --clobber
