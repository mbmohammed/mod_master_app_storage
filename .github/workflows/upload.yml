name: Auto APK Uploader

on:
  push:
    paths:
      - 'latest_link.txt'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Read and Clean Download Link
      run: |
        LINK=$(cat latest_link.txt | tr -d '\r' | tr -d '\n' | xargs)
        
        # ሊንኩ .apk ካለው ኦሪጅናል ስሙን ይይዛል፣ ከሌለው የHerokuን ልዩ መለያ ቁጥር ስም ያደርገዋል
        if [[ "$LINK" == *.apk* ]]; then
          FILENAME=$(basename "$LINK" | cut -d? -f1)
        else
          FILENAME=$(basename "$LINK").apk
        fi
        
        # ስሙ ባዶ ወይም የተበላሸ ከሆነ በሰከንድ ቁጥር ይተካዋል
        if [[ -z "$FILENAME" || "$FILENAME" == *.com* ]]; then
          FILENAME="app_$(date +%s).apk"
        fi
        
        echo "TG_LINK=$LINK" >> $GITHUB_ENV
        echo "APK_NAME=$FILENAME" >> $GITHUB_ENV

    - name: Download APK Directly
      run: |
        echo "📥 አፑን በስሙ [ ${{ env.APK_NAME }} ] ማውረድ ተጀምሯል..."
        # -o በመጠቀም ማሽኑ ሰርቨሩን ሳይጠይቅ በግድ እኛ በሰጠነው ስም እንዲያወርደው እናደርጋለን (ይህ መቼም አይሳሳትም)
        curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" -o "${{ env.APK_NAME }}" "${{ env.TG_LINK }}"
        
        # ፋይሉ በትክክል መውረዱን ማረጋገጫ
        if [ ! -s "${{ env.APK_NAME }}" ]; then
          echo "❌ ፋይሉ አልወረደም ወይም ሊንኩ ባዶ ነው!"
          exit 1
        fi

    - name: Upload to GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # v1.0 የተባለ የሪሊዝ ገጽ ከሌለ መጀመሪያ ይፈጥረዋል
        gh release view v1.0 || gh release create v1.0 --title "Mod Master Store" --notes "Uploaded via Admin UI"
        
        # አፑን ወደ ሪሊዝ ይጭነዋል
        gh release upload v1.0 "${{ env.APK_NAME }}" --clobber
