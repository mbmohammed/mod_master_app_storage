name: Auto APK Uploader

on:
  push:
    paths:
      - 'latest_link.txt'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Read and Clean Download Link
      run: |
        LINK=$(cat latest_link.txt | tr -d '\r' | tr -d '\n' | xargs)
        
        if [[ "$LINK" == *.apk* ]]; then
          FILENAME=$(basename "$LINK" | cut -d? -f1)
        else
          FILENAME=$(basename "$LINK").apk
        fi
        
        if [[ -z "$FILENAME" || "$FILENAME" == *.com* ]]; then
          FILENAME="app_$(date +%s).apk"
        fi
        
        echo "TG_LINK=$LINK" >> $GITHUB_ENV
        echo "APK_NAME=$FILENAME" >> $GITHUB_ENV

    - name: Download APK Directly
      run: |
        echo "📥 አፑን ማውረድ ተጀምሯል..."
        curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" -o "${{ env.APK_NAME }}" "${{ env.TG_LINK }}"
        
        # የፋይሉን መጠን በካይት (Bytes) ይለካል
        FILE_SIZE=$(stat -c%s "${{ env.APK_NAME }}")
        echo "💡 የወረደው ፋይል መጠን: $FILE_SIZE Bytes"
        
        # ፋይሉ ከ 50KB በታች ከሆነ አፕ አይደለም (የስህተት ገጽ ነው) ማለት ስለሆነ እንዲያቆም እናደርጋለን
        if [ "$FILE_SIZE" -lt 50000 ]; then
          echo "❌ ስህተት: የወረደው ፋይል እውነተኛ አፕ አይደለም (በጣም ትንሽ ነው)! ሊንኩ አልፏል ወይም የተበላሸ ነው።"
          rm "${{ env.APK_NAME }}"
          exit 1
        fi

    - name: Upload to GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release view v1.0 || gh release create v1.0 --title "Mod Master Store" --notes "Uploaded via Admin UI"
        gh release upload v1.0 "${{ env.APK_NAME }}" --clobber
