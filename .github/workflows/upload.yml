name: Auto APK Uploader

on:
  push:
    paths:
      - 'latest_link.txt' # ይህ ፋይል በዌብሳይትህ ሲቀየር ማሽኑ በራሱ ይነሳል

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Read Download Link
      id: get_link
      run: |
        LINK=$(cat latest_link.txt)
        echo "TG_LINK=$LINK" >> $GITHUB_ENV

    - name: Download APK from Telegram
      run: |
        wget --user-agent="Mozilla/5.0" -O mod_master_app.apk "${{ env.TG_LINK }}"

    - name: Upload to GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create v1.0 mod_master_app.apk --title "Mod Master Storage" --notes "Uploaded automatically via Admin UI" --clobber || gh release upload v1.0 mod_master_app.apk --clobber
